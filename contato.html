<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Contato</title>

    <!-- Ajustes para telas pequenas (celulares, tablets) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Importa o arquivo CSS responsável pela aparência da página. -->
    <link rel="stylesheet" href="style.css">
</head>


<body>

    <main class="sobre">
        <!-- Menu lateral com os links de navegação -->
        <aside class="menu">
        <h1>Neto</h1>
        <nav>
            <ul>
                <li><a href="sobre.html">Sobre mim</a></li>
                <li><a href="formacao.html">Formação</a></li>
                <li><a href="portifolio.html">Portfólio</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
        </aside>

        <!-- Seção criando formulário de contato -->
        <section class="conteudo">
            <h2>Contato</h2>

            <!-- Envio dos dados do formulário para o Formspree
            A entrada de dados do formulário será validada via script -->
            
            <form id="form-contato" action="https://formspree.io/f/mpqboger" method="POST" novalidate>
                <input type="text" id="nome" name="nome" placeholder="Nome"> 
                <input type="email" id="email" name="email" placeholder="E-mail">
                <textarea id="mensagem" name="mensagem" placeholder="Mensagem"></textarea>
                <button type="submit">Enviar</button>
                <p id="aviso"></p>  
            </form>
        </section>
    </main>

    <!-- Importa o JavaScript. Ele será usado para validar e enviar o formulário. -->
    <script src="script.js"></script> 
</body>
</html>
